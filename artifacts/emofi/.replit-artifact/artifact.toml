kind = "web"
previewPath = "/"
title = "EmoFi Protocol"
version = "1.0.0"
id = "artifacts/emofi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20267

[services.development]
run = "pnpm --filter @workspace/emofi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emofi", "run", "build" ]
publicDir = "artifacts/emofi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20267"
BASE_PATH = "/"
